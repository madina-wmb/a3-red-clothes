<h1>Избранное</h1>
<div class="cards-fovorit" id="favorites"></div>

<script>
const favoritesBlock = document.getElementById("favorites");
const favorites = JSON.parse(localStorage.getItem("favorites")) || [];

favorites.forEach(product => {
    const div = document.createElement("div");
    div.classList.add("card-fovorit");
    div.innerHTML = `
        <img src="${product.img}" alt="${product.name}">
        <h4>${product.name}</h4>
        <p>${product.price}</p>
        <button class="remove">Удалить</button>
    `;
    // Удаление товара
    div.querySelector(".remove").addEventListener("click", () => {
        const updatedFavorites = favorites.filter(item => item.name !== product.name);
        localStorage.setItem("favorites", JSON.stringify(updatedFavorites));
        div.remove();
    });

    favoritesBlock.appendChild(div);
});
</script>
