<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог товаров</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>



    <section class="new-colection">
        <div class="l-block">
            <h2>Новая</h2> 
        </div>
        
        <div class="c-block"> 
            <h2>колекция</h2>
        </div>
        
        <div class="r-block"> 
            <img src="./images/image copy 6.png" alt="">
        </div>
    </section>

    <div class="container" id="products">
        <div class="left">
    <h2>Все товары</h2>
    <input type="text" id="search" placeholder="Поиск...">
    </div>
    
        <div class="cards">
             <div class="card" data-id="1" data-name="Красная худи" data-price="3595">
        <img src="./images/image.png">
        <h4>Красная худи</h4>
        <div class="price">3595 ₽</div>
        <button class="add-btn">+</button>
    </div>

    <div class="card" data-id="2" data-name="Зелёное платье" data-price="3500">
        <img src="./images/image copy.png">
        <h4>Зелёное платье</h4>
        <div class="price">3500 ₽</div>
        <button class="add-btn">+</button>
    </div>

    <div class="card" data-id="3" data-name="Водолазка" data-price="2999">
        <img src="./images/image copy 2.png">
        <h4>Водолазка</h4>
        <div class="price">2999 ₽</div>
        <button class="add-btn">+</button>
    </div>

    <div class="card" data-id="4" data-name="Домашний костюм" data-price="1699">
        <img src="./images/image copy 3.png">
        <h4>Домашний костюм</h4>
        <div class="price">1699 ₽</div>
        <button class="add-btn">+</button>
    </div>

    <div class="card" data-id="5" data-name="Пуловер" data-price="3595">
        <img src="./images/image copy 4.png">
        <h4>Пуловер</h4>
        <div class="price">3595 ₽</div>
        <button class="add-btn">+</button>
    </div>

    <div class="card" data-id="6" data-name="Платье с принтом" data-price="3799">
        <img src="./images/image copy 5.png">
        <h4>Платье с принтом</h4>
        <div class="price">3799 ₽</div>
        <button class="add-btn">+</button>
    </div>

        </div>
   
</div>

<div class="cart" id="cart">
    <h3>Корзина</h3>
    <div id="cart-items"></div>
    <div class="total">Итого: <span id="total-price">0</span> ₽</div>
</div>



<script src="app.js"></script>
</body>
</html>
